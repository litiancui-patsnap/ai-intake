name: Weekly AI Digest

on:
  schedule:
    # 北京时间 周一 09:00 = UTC 周一 01:00
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-intake-weekly
  cancel-in-progress: false

jobs:
  generate-weekly-report:
    runs-on: ubuntu-latest
    environment: personal
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
      PYTHONUTF8: "1"
      AI_INTAKE_LLM_PROVIDER: openai_compatible
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly digest and send Feishu
        run: python -m src.main weekly --verbose

      - name: Upload weekly report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: outputs/weekly/*.md
          retention-days: 90
