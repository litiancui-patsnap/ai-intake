# AI Intake 规则配置
# 目标：只保留对“个人每天快速了解 AI 研发 / 工程 / 测试动态”真正有价值的内容

scoring:
  weights:
    research_signal: 0.22
    engineering_signal: 0.38
    authority: 0.18
    freshness: 0.12
    preference: 0.10

  research_keywords:
    high_value:
      - "new model"
      - "sota"
      - "state-of-the-art"
      - "breakthrough"
      - "benchmark"
      - "outperform"
      - "surpass"
      - "accuracy"
      - "evaluation"
    medium_value:
      - "paper"
      - "research"
      - "arxiv"
      - "experiment"
      - "dataset"
      - "leaderboard"
    low_value:
      - "study"
      - "analysis"
      - "survey"

  engineering_keywords:
    critical:
      - "breaking change"
      - "deprecated"
      - "deprecat"
      - "migration"
      - "security"
      - "vulnerability"
      - "cve"
      - "incident"
    high_value:
      - "release"
      - "launch"
      - "launched"
      - "available"
      - "general availability"
      - "api"
      - "sdk"
      - "performance"
      - "speedup"
      - "latency"
      - "throughput"
      - "benchmark"
      - "inference"
      - "serving"
      - "agent"
      - "evaluation"
      - "testing"
    medium_value:
      - "update"
      - "feature"
      - "support"
      - "integration"
      - "guide"
      - "documentation"
      - "example"
      - "tutorial"

  freshness:
    max_score: 10
    decay_hours: 36

must_read_rules:
  - condition: "score >= 92 and authority_score >= 90"
    reason: "高分且高权威来源"

  - condition: "score >= 88 and (contains('security') or contains('vulnerability') or contains('cve') or contains('incident'))"
    reason: "高优先级安全事件"

  - condition: "score >= 88 and (contains('breaking change') or contains('deprecated') or contains('deprecat') or contains('migration'))"
    reason: "可能影响现有接入的破坏性变更"

  - condition: "score >= 90 and (source_contains('OpenAI') or source_contains('Anthropic') or source_contains('Google') or source_contains('Meta')) and contains_any(['release', 'launch', 'available', 'api', 'sdk'])"
    reason: "主流厂商的重要模型或平台发布"

  - condition: "score >= 90 and contains_any(['gpt-', 'claude', 'gemini', 'llama', 'qwen', 'deepseek']) and contains_any(['release', 'launch', 'available', 'api', 'sdk'])"
    reason: "主流模型家族的重要版本更新"

  - condition: "score >= 88 and contains_any(['10x faster', '10x speedup', '100x faster', 'order of magnitude', 'latency reduced', 'throughput increased'])"
    reason: "量级级别的性能提升"

filter_rules:
  - condition: "score < 35"
    reason: "分数过低，直接过滤"

  - condition: "source_contains('arxiv') and score < 65 and not contains_any(['code', 'implementation', 'opensource', 'open source', 'github'])"
    reason: "纯论文但缺少工程落地信号"

  - condition: "is_duplicate"
    reason: "重复内容"

  - condition: "age_days > 5"
    reason: "时效性不足"

output:
  daily:
    max_items: 20
    must_read_min: 0
    must_read_max: 3
    top_focus_count: 3
    min_score: 60
    group_by: topic
    sort_by: score

  weekly:
    max_items: 80
    trend_count: 4
    must_do_count: 3
    watchlist_count: 5
    min_score: 55

  markdown:
    include_score_breakdown: false
    include_action: true
    include_related_links: false
    max_summary_length: 140
    topic_item_limit: 4

preferences:
  priority_vendors:
    - "OpenAI"
    - "Anthropic"
    - "Google"
    - "Meta"
    - "NVIDIA"
    - "Microsoft"
    - "DeepSeek"
    - "阿里云"
    - "字节跳动"

  priority_tools:
    - "vLLM"
    - "Transformers"
    - "PyTorch"
    - "LangChain"
    - "LangGraph"
    - "Ollama"
    - "FastAPI"
    - "Playwright"
    - "pytest"

  priority_topics:
    - "Inference"
    - "Serving"
    - "API"
    - "LLM"
    - "Agent"
    - "Evaluation"
    - "Testing"
    - "Benchmark"
    - "Security"

  low_priority_topics:
    - "融资"
    - "市场营销"
    - "品牌宣传"
    - "活动预告"

locale:
  timezone: "Asia/Shanghai"
  language: "zh-CN"
  date_format: "%Y-%m-%d"
  time_format: "%H:%M"

dedup:
  url_similarity_threshold: 0.9
  title_similarity_threshold: 0.85
  content_similarity_threshold: 0.95
  lookback_days: 30

llm:
  enabled: true
  provider: "openai_compatible"
  model: "gpt-5.4"
  max_tokens: 500
  temperature: 0.3
  timeout: 30
  batch_size: 10
  fallback_to_extractive: true

network:
  timeout: 30
  max_retries: 3
  retry_delay: 2
  concurrent_fetches: 10
  user_agent: "AI-Intake/1.0 (personal daily digest)"

notify:
  personal_use_only: true
  feishu_enabled: true
  feishu_max_items: 3
  feishu_include_infographic: false
  feishu_image_output_dir: "outputs/feishu"
  wecom_enabled: false
  serverchan_enabled: false
  pushplus_enabled: false

# 说明
# 1. 这份配置偏“少而准”，目标是日报一眼能看完，不追求全量收录。
# 2. must_read_rules 只保留高确定性事件，避免把“普通更新”误标成必看。
# 3. 如果后续你想进一步收紧，可优先继续提高 daily.min_score 或降低 daily.max_items。
# 4. notify 默认按“个人使用”配置，只启用飞书且只发少量重点，不启用其他推送渠道。
